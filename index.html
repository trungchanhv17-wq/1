<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeutschLernen AI - Learn German Smarter</title>
    <script>
      // Global fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in certain iframe environments where fetch is protected.
      (function() {
        try {
          const original = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return original; },
            set: function() { /* ignore or log attempts to overwrite */ },
            configurable: true
          });
        } catch (e) {
          console.debug('Fetch protection failed:', e);
        }
      })();
    </script>
  </head>
  <body class="bg-[#F7F9FC]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
